version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      fastify:
        patterns:
          - '@fastify/*'
          - 'fastify'
    ignore:
      # Upgrade Nx manually with `nx migrate latest`
      - dependency-name: '@nx/*'
      - dependency-name: 'nx'
      # SWC versions are pinned as Nx peer deps; upgrade together with Nx
      - dependency-name: '@swc/core'
      - dependency-name: '@swc-node/register'
      # ESLint major versions are tied to Nx; upgrade together with Nx
      - dependency-name: '@eslint/*'
      - dependency-name: '@typescript-eslint/*'
      - dependency-name: 'eslint'
      - dependency-name: 'eslint-plugin-svelte'
      # Vite/Vitest versions are managed through @nx/vite; upgrade together with Nx
      - dependency-name: 'vite'
      - dependency-name: 'vitest'
      - dependency-name: '@vitest/*'
      # comunica 5.2.x has a server-side regression that hangs on CONSTRUCT queries
      # with multiple OPTIONAL clauses (used by ldkit in dataset-registry-client tests).
      # Re-evaluate when 5.3 lands or comunica/comunica#new-issue is resolved.
      - dependency-name: '@comunica/*'
        versions: ['>=5.2.0 <5.3.0']
